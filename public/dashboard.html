<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smart Helmet — Live Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    /* ── Login ── */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 40px; width: 100%; max-width: 380px; }
    .login-card h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; color: #f1f5f9; }
    .login-card p { font-size: 0.85rem; color: #94a3b8; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 10px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #f1f5f9; font-size: 0.9rem; outline: none; transition: border 0.2s; }
    .form-group input:focus { border-color: #6366f1; }
    .btn-primary { width: 100%; padding: 11px; background: #6366f1; color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled { background: #3730a3; cursor: not-allowed; }
    .error-msg { color: #f87171; font-size: 0.82rem; margin-top: 10px; text-align: center; }

    /* ── Dashboard ── */
    #dashboard-screen { display: none; }
    .topbar { background: #1e293b; border-bottom: 1px solid #334155; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-left span { font-weight: 700; font-size: 1rem; color: #f1f5f9; }
    .topbar-left .badge { background: #6366f1; color: #fff; font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .refresh-info { font-size: 0.78rem; color: #64748b; }
    .live-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    .logout-btn { background: none; border: 1px solid #334155; color: #94a3b8; padding: 5px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
    .logout-btn:hover { border-color: #6366f1; color: #f1f5f9; }

    .main { padding: 24px; max-width: 1400px; margin: 0 auto; }

    /* ── Stat cards ── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 20px; }
    .stat-card .label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: #f1f5f9; }
    .stat-card .sub { font-size: 0.78rem; color: #64748b; margin-top: 4px; }
    .stat-card.green .value { color: #22c55e; }
    .stat-card.red .value { color: #f87171; }
    .stat-card.yellow .value { color: #fbbf24; }
    .stat-card.purple .value { color: #a78bfa; }

    /* ── Section ── */
    .section-title { font-size: 0.85rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media(max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; overflow: hidden; }
    .card-header { padding: 14px 18px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; }
    .card-header span { font-size: 0.9rem; font-weight: 600; color: #f1f5f9; }
    .card-body { padding: 0; }

    /* ── Device table ── */
    table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    th { padding: 10px 16px; text-align: left; color: #64748b; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid #334155; }
    td { padding: 12px 16px; border-bottom: 1px solid #1e293b; color: #cbd5e1; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #0f172a33; }

    .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .pill.online { background: #14532d55; color: #4ade80; }
    .pill.offline { background: #7f1d1d44; color: #f87171; }
    .pill.critical { background: #7f1d1d55; color: #f87171; }
    .pill.warning { background: #78350f55; color: #fbbf24; }
    .pill.info { background: #1e3a5f55; color: #60a5fa; }

    /* ── Events ── */
    .event-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 18px; border-bottom: 1px solid #334155; }
    .event-row:last-child { border-bottom: none; }
    .event-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0; }
    .event-icon.CRITICAL { background: #7f1d1d44; }
    .event-icon.WARNING { background: #78350f44; }
    .event-icon.INFO { background: #1e3a5f44; }
    .event-meta { flex: 1; min-width: 0; }
    .event-meta .type { font-size: 0.82rem; font-weight: 600; color: #f1f5f9; }
    .event-meta .device { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
    .event-time { font-size: 0.72rem; color: #475569; white-space: nowrap; }

    /* ── Telemetry card ── */
    .tele-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #334155; }
    .tele-item { background: #1e293b; padding: 14px 16px; }
    .tele-item .tele-label { font-size: 0.72rem; color: #64748b; text-transform: uppercase; margin-bottom: 4px; }
    .tele-item .tele-value { font-size: 1.1rem; font-weight: 700; color: #f1f5f9; }

    .empty { padding: 32px; text-align: center; color: #475569; font-size: 0.85rem; }
    .loading { padding: 32px; text-align: center; color: #475569; font-size: 0.85rem; }

    .full-card { margin-bottom: 24px; }
  </style>
</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <div class="login-card">
    <h1>🪖 Smart Helmet</h1>
    <p>Live Dashboard — Admin Login</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" value="admin@smarthelmet.local" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" value="Admin@12345" />
    </div>
    <button class="btn-primary" id="login-btn" onclick="login()">Sign In</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- ── Dashboard ── -->
<div id="dashboard-screen">
  <div class="topbar">
    <div class="topbar-left">
      <span>🪖 Smart Helmet</span>
      <span class="badge">LIVE</span>
    </div>
    <div class="topbar-right">
      <span class="live-dot"></span>
      <span class="refresh-info" id="refresh-info">Refreshing every 10s</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="main">
    <!-- Stats -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card purple"><div class="label">Total Devices</div><div class="value" id="s-total">—</div></div>
      <div class="stat-card green"><div class="label">Online Now</div><div class="value" id="s-online">—</div></div>
      <div class="stat-card yellow"><div class="label">Offline</div><div class="value" id="s-offline">—</div></div>
      <div class="stat-card red"><div class="label">Critical Events (24h)</div><div class="value" id="s-critical">—</div></div>
      <div class="stat-card"><div class="label">Emergency Contacts</div><div class="value" id="s-contacts">—</div><div class="sub">active</div></div>
      <div class="stat-card"><div class="label">Total Telemetry</div><div class="value" id="s-telemetry">—</div><div class="sub">records</div></div>
    </div>

    <!-- Device Status + Recent Events -->
    <div class="grid-2">
      <div class="card">
        <div class="card-header"><span>Device Status</span></div>
        <div class="card-body" id="device-table"><div class="loading">Loading...</div></div>
      </div>
      <div class="card">
        <div class="card-header"><span>Recent Events</span></div>
        <div class="card-body" id="events-list"><div class="loading">Loading...</div></div>
      </div>
    </div>

    <!-- Latest Telemetry -->
    <div class="card full-card">
      <div class="card-header"><span>Latest Telemetry per Device</span></div>
      <div class="card-body" id="telemetry-table"><div class="loading">Loading...</div></div>
    </div>
  </div>
</div>

<script>
  const BASE = '';
  let token = localStorage.getItem('helmet_token');
  let refreshTimer = null;

  if (token) showDashboard();

  async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');
    btn.disabled = true; btn.textContent = 'Signing in...'; err.textContent = '';
    try {
      const r = await fetch(BASE + '/api/admin/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.message || 'Login failed');
      token = d.data.token;
      localStorage.setItem('helmet_token', token);
      showDashboard();
    } catch(e) {
      err.textContent = e.message;
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }

  function logout() {
    localStorage.removeItem('helmet_token');
    token = null;
    clearInterval(refreshTimer);
    document.getElementById('dashboard-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard-screen').style.display = 'block';
    loadAll();
    refreshTimer = setInterval(() => { loadAll(); updateRefreshInfo(); }, 10000);
  }

  let lastRefresh = Date.now();
  function updateRefreshInfo() {
    const sec = Math.round((Date.now() - lastRefresh) / 1000);
    document.getElementById('refresh-info').textContent = `Last updated ${sec}s ago`;
  }

  async function api(path) {
    const r = await fetch(BASE + path, { headers: { 'Authorization': 'Bearer ' + token } });
    if (r.status === 401) { logout(); throw new Error('Session expired'); }
    return r.json();
  }

  async function loadAll() {
    lastRefresh = Date.now();
    document.getElementById('refresh-info').textContent = 'Refreshing...';
    await Promise.all([loadSummary(), loadDevices(), loadEvents(), loadTelemetry()]);
    document.getElementById('refresh-info').textContent = 'Just updated';
  }

  async function loadSummary() {
    try {
      const d = await api('/api/admin/dashboard/summary');
      const s = d.data.stats;
      document.getElementById('s-total').textContent = s.total_devices;
      document.getElementById('s-online').textContent = s.online_devices;
      document.getElementById('s-offline').textContent = s.offline_devices;
      document.getElementById('s-critical').textContent = s.critical_events_24h;
      document.getElementById('s-contacts').textContent = s.total_emergency_contacts;
      document.getElementById('s-telemetry').textContent = s.total_telemetry_records.toLocaleString();
    } catch(e) { console.error(e); }
  }

  async function loadDevices() {
    try {
      const d = await api('/api/admin/dashboard/device-statuses');
      const devices = d.data;
      if (!devices.length) { document.getElementById('device-table').innerHTML = '<div class="empty">No devices registered</div>'; return; }
      let html = '<table><thead><tr><th>Device ID</th><th>Name</th><th>Status</th><th>Helmet</th><th>Battery</th><th>Last Seen</th></tr></thead><tbody>';
      for (const dev of devices) {
        const online = dev.is_online;
        const s = dev.latest_state;
        const battery = s?.main_battery_percent != null ? Math.round(s.main_battery_percent) + '%' : '—';
        const helmet = s?.helmet_worn != null ? (s.helmet_worn ? '✅ Worn' : '❌ Off') : '—';
        const lastSeen = dev.last_seen ? timeAgo(dev.last_seen) : 'Never';
        html += `<tr>
          <td style="font-family:monospace;color:#a78bfa">${dev.device_id}</td>
          <td>${dev.name}</td>
          <td><span class="pill ${online ? 'online' : 'offline'}">${online ? '● Online' : '● Offline'}</span></td>
          <td>${helmet}</td>
          <td>${battery}</td>
          <td style="color:#64748b">${lastSeen}</td>
        </tr>`;
      }
      html += '</tbody></table>';
      document.getElementById('device-table').innerHTML = html;
    } catch(e) { console.error(e); }
  }

  async function loadEvents() {
    try {
      const d = await api('/api/admin/telemetry/events?limit=8');
      const events = d.data;
      if (!events.length) { document.getElementById('events-list').innerHTML = '<div class="empty">No events yet</div>'; return; }
      const icons = { CRITICAL: '🚨', WARNING: '⚠️', INFO: 'ℹ️' };
      let html = '';
      for (const ev of events) {
        const sev = ev.severity || 'INFO';
        html += `<div class="event-row">
          <div class="event-icon ${sev}">${icons[sev]}</div>
          <div class="event-meta">
            <div class="type">${formatEventType(ev.event_type)}</div>
            <div class="device">${ev.main_device?.device_id || '—'} ${ev.event_message ? '· ' + ev.event_message : ''}</div>
          </div>
          <div class="event-time">${timeAgo(ev.timestamp)}</div>
        </div>`;
      }
      document.getElementById('events-list').innerHTML = html;
    } catch(e) { console.error(e); }
  }

  async function loadTelemetry() {
    try {
      const d = await api('/api/admin/telemetry?limit=5');
      const records = d.data;
      if (!records.length) { document.getElementById('telemetry-table').innerHTML = '<div class="empty">No telemetry yet</div>'; return; }
      let html = '<table><thead><tr><th>Device</th><th>Time</th><th>Helmet</th><th>Relay</th><th>Main Bat.</th><th>Helmet Bat.</th><th>Speed</th><th>GPS</th><th>Signal</th></tr></thead><tbody>';
      for (const t of records) {
        const gps = t.latitude && t.longitude ? `${t.latitude.toFixed(4)}, ${t.longitude.toFixed(4)}` : '—';
        html += `<tr>
          <td style="font-family:monospace;color:#a78bfa">${t.main_device?.device_id || '—'}</td>
          <td style="color:#64748b">${timeAgo(t.timestamp)}</td>
          <td>${t.helmet_worn != null ? (t.helmet_worn ? '✅' : '❌') : '—'}</td>
          <td>${t.relay_state != null ? (t.relay_state ? '🟢' : '🔴') : '—'}</td>
          <td>${t.main_battery_percent != null ? Math.round(t.main_battery_percent) + '%' : '—'}</td>
          <td>${t.helmet_battery_percent != null ? Math.round(t.helmet_battery_percent) + '%' : '—'}</td>
          <td>${t.speed_kmph != null ? t.speed_kmph.toFixed(1) + ' km/h' : '—'}</td>
          <td style="font-size:0.78rem;color:#60a5fa">${gps}</td>
          <td>${t.signal_strength != null ? t.signal_strength + ' dBm' : '—'}</td>
        </tr>`;
      }
      html += '</tbody></table>';
      document.getElementById('telemetry-table').innerHTML = html;
    } catch(e) { console.error(e); }
  }

  function formatEventType(t) {
    return t ? t.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) : '—';
  }

  function timeAgo(iso) {
    const sec = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (sec < 60) return sec + 's ago';
    if (sec < 3600) return Math.floor(sec/60) + 'm ago';
    if (sec < 86400) return Math.floor(sec/3600) + 'h ago';
    return Math.floor(sec/86400) + 'd ago';
  }

  document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
</script>
</body>
</html>
